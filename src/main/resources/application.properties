# ===========================
# Server
# ===========================
server.port=8080

# ===========================
# Database (MySQL)
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=#01Ayushraj
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===========================
# JWT
# ===========================
# IMPORTANT: Replace with a strong 256-bit secret in production
app.jwt.secret=myVerySecretKeyForJwtTokenGenerationThatIsAtLeast256BitsLong!
app.jwt.expiration-ms=86400000

# ===========================
# Swagger / OpenAPI
# ===========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true

# ===========================
# Logging
# ===========================
logging.level.com.ecommerce=DEBUG
logging.level.org.springframework.security=INFO
